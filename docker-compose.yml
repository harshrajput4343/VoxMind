version: "3.9"

services:
  empathy-engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOG_LEVEL=INFO
      # Add your keys here or use .env file:
      # - ELEVENLABS_API_KEY=your_key_here
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./model_cache:/app/model_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
