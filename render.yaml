services:
  - type: web
    name: empathy-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
