services:
  - type: web
    name: empathy-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: outputs
      mountPath: /app/outputs
      sizeGB: 1
